# Netlify configuration for Takumi Greenhouse (React Router v7 SPA)
#
# This tells Netlify to:
# 1. Build with `npm run build` (auto-detected, but explicit is safer)
# 2. Serve all routes from the built `dist/` folder
# 3. Redirect all SPA routes to index.html (same as Vercel rewrites)
# 4. Set aggressive cache-control headers on hashed assets

[build]
  command = "npm run build"
  publish = "dist"

# SPA fallback — all routes redirect to index.html so React Router handles them [[redirects]]

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = true

# Cache hashed assets forever (immutable) — images, JS bundles, CSS [[headers]]

[[headers]]
  for = "/assets/*"
    [headers.values]
      Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
    [headers.values]
      Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
    [headers.values]
      Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
    [headers.values]
      Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpg"
    [headers.values]
      Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.JPG"
    [headers.values]
      Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.PNG"
    [headers.values]
      Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
    [headers.values]
      Cache-Control = "public, max-age=31536000, immutable"
